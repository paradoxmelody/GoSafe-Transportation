<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In | GoSafe Transport</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="login-container">
    <div id="main">
      <h1>Sign In</h1>
      <input id="email" type="email" placeholder="Email" autocomplete="email">
      <input id="password" type="password" placeholder="Password" autocomplete="current-password">
      <button id="submit" type="button">Sign In</button>
      <p><span>or</span></p>
      <button id="sign-up" type="button">Sign Up</button>
      <a href="../index.html" class="back-link">← Back to GoSafe</a>
    </div>

    <div id="create-acct">
      <h1>Create a GoSafe Account</h1>
      <input id="email-signup" type="email" placeholder="Email *" autocomplete="email">
      <input id="confirm-email-signup" type="email" placeholder="Confirm Email *">
      <input id="password-signup" type="password" placeholder="Password *" autocomplete="new-password">
      <input id="confirm-password-signup" type="password" placeholder="Confirm Password *">
      <button id="create-acct-btn" type="button">Create Account</button>
      <button id="return-btn" type="button">Return to Login</button>
    </div>
  </div>
  <script type="module" src="./man.js"></script>
</body>
</html>
